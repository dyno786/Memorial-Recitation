<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khatam</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .loading-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
    }
    .loading-logo {
      font-size: 32px;
      font-weight: bold;
      color: #caa85c;
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(202,168,92,.2);
      border-top-color: #caa85c;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #c9c7b9; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loading-screen">
    <div class="loading-logo">🤲 Khatam</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    (async function() {
      var slug = new URLSearchParams(window.location.search).get("slug");

      // If a slug is passed, go straight to recite page
      if (slug) {
        window.location.replace("recite.html?slug=" + encodeURIComponent(slug));
        return;
      }

      try {
        var client = window.supabase.createClient(
          window.APP_CONFIG.supabaseUrl,
          window.APP_CONFIG.supabasePublishableKey
        );
        var session = await client.auth.getSession();

        if (session.data && session.data.session) {
          // Logged in — go to recite page
          window.location.replace("recite.html");
        } else {
          // Not logged in — go to landing
          window.location.replace("landing.html");
        }
      } catch(e) {
        // Fallback to landing
        window.location.replace("landing.html");
      }
    })();
  </script>
</body>
</html>
