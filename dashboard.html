<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home — Khatam</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background:#03110f; color:#f5f5f0; }
    .shell { width:min(1000px,calc(100% - 32px)); margin:0 auto; padding:24px 0 90px; }

    .greeting { margin-bottom:20px; }
    .greeting h1 { font-size:clamp(20px,4vw,32px); margin:0 0 4px; }
    .greeting p { color:#c9c7b9; font-size:14px; margin:0; }

    .stats-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:24px; }
    .stat-card { background:linear-gradient(135deg,#0d1e18,#10241d); border:1px solid rgba(255,255,255,.06); border-radius:14px; padding:14px; text-align:center; }
    .stat-val { display:block; font-size:26px; font-weight:bold; color:#caa85c; }
    .stat-lbl { display:block; font-size:11px; color:#c9c7b9; margin-top:3px; }

    .dash-section { margin-bottom:24px; }
    .dash-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
    .dash-head h2 { margin:0; font-size:17px; }

    .mem-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
    .mem-card { background:linear-gradient(135deg,#0d1e18,#10241d); border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:16px; display:flex; flex-direction:column; gap:10px; cursor:pointer; transition:border-color .2s; text-decoration:none; color:inherit; }
    .mem-card:hover { border-color:rgba(202,168,92,.35); }
    .mem-card-top { display:flex; gap:10px; align-items:flex-start; }
    .mem-avatar { width:44px; height:44px; border-radius:10px; background:rgba(202,168,92,.1); border:1px solid rgba(202,168,92,.15); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; overflow:hidden; }
    .mem-avatar img { width:100%; height:100%; object-fit:cover; }
    .mem-name { font-size:15px; font-weight:bold; margin:0 0 3px; }
    .mem-meta { font-size:11px; color:#c9c7b9; line-height:1.6; margin:0; }
    .mem-progress { }
    .mem-progress-label { display:flex; justify-content:space-between; font-size:10px; color:#c9c7b9; margin-bottom:4px; }
    .mem-progress-bar { height:5px; background:#173026; border-radius:999px; overflow:hidden; }
    .mem-progress-fill { height:100%; background:#caa85c; border-radius:999px; transition:width .6s; }
    .mem-actions { display:flex; gap:6px; }
    .mem-btn { flex:1; padding:8px; border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer; border:none; text-align:center; text-decoration:none; display:block; }
    .mem-btn-primary { background:#caa85c; color:#111; }
    .mem-btn-secondary { background:rgba(255,255,255,.06); color:#f5f5f0; border:1px solid rgba(255,255,255,.1); }

    .empty-state { text-align:center; padding:36px 20px; color:#c9c7b9; background:rgba(255,255,255,.02); border:1px dashed rgba(255,255,255,.1); border-radius:16px; }
    .empty-icon { font-size:36px; margin-bottom:10px; }
    .empty-state h3 { margin:0 0 6px; font-size:15px; color:#f5f5f0; }
    .empty-state p { font-size:13px; margin:0 0 14px; }

    .search-wrap { position:relative; margin-bottom:10px; }
    .search-input { width:100%; border:none; outline:none; border-radius:12px; padding:12px 16px 12px 40px; background:#1a3028; color:#fff; font-size:14px; box-sizing:border-box; }
    .search-input::placeholder { color:#5a7a6a; }
    .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }
    .search-results { display:none; }

    @media(max-width:600px) { .stats-strip { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
  <div class="shell">

    <div class="greeting">
      <h1 id="greetingText">Assalamu Alaikum 🤲</h1>
      <p id="greetingSubtext">Loading your dashboard...</p>
    </div>

    <div class="stats-strip">
      <div class="stat-card"><span class="stat-val" id="myRec">—</span><span class="stat-lbl">Recitations</span></div>
      <div class="stat-card"><span class="stat-val" id="myMem">—</span><span class="stat-lbl">Memorials</span></div>
      <div class="stat-card"><span class="stat-val" id="myJuz">—</span><span class="stat-lbl">Juz claimed</span></div>
      <div class="stat-card"><span class="stat-val" id="myNotes">—</span><span class="stat-lbl">Memory notes</span></div>
    </div>

    <!-- My Memorials -->
    <div class="dash-section">
      <div class="dash-head">
        <h2>My memorials</h2>
        <a href="admin.html" class="btn btn-primary" id="createBtn" style="display:none;padding:8px 16px;font-size:13px;">+ Create memorial</a>
      </div>
      <div class="mem-grid" id="myMemGrid">
        <div class="empty-state"><div class="empty-icon">⏳</div><h3>Loading...</h3></div>
      </div>
    </div>

    <!-- Shared with me -->
    <div class="dash-section">
      <div class="dash-head">
        <h2>Shared with me</h2>
        <p class="muted-text" style="margin:0;font-size:13px;">Memorials you've joined via a shared link</p>
      </div>
      <div class="mem-grid" id="sharedMemGrid">
        <div class="empty-state"><div class="empty-icon">⏳</div><h3>Loading...</h3></div>
      </div>
    </div>

    <!-- Find a memorial -->
    <div class="dash-section">
      <div class="dash-head">
        <h2>Find a memorial</h2>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search by name, mosque or city..." oninput="doSearch(this.value)" />
      </div>
      <div class="mem-grid search-results" id="searchResults"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    var client = window.supabase.createClient(
      window.APP_CONFIG.supabaseUrl,
      window.APP_CONFIG.supabasePublishableKey
    );
    var currentUser = null;
    var currentProfile = null;
    var searchTimer = null;

    async function init() {
      var s = await client.auth.getSession();
      if (!s.data || !s.data.session) { window.location.href = "login.html"; return; }
      currentUser = s.data.session.user;
      var p = await client.from("profiles").select("*").eq("id", currentUser.id).maybeSingle();
      currentProfile = p.data;

      var name = currentProfile ? currentProfile.full_name.split(" ")[0] : "there";
      var hour = new Date().getHours();
      var greet = hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
      document.getElementById("greetingText").textContent = greet + ", " + name + " 🤲";
      document.getElementById("greetingSubtext").textContent = "May your recitations be accepted. Ameen.";

      var isApproved = currentProfile && currentProfile.account_type === "mosque_approved";
      var isSuperAdmin = currentUser.email === (window.APP_CONFIG && window.APP_CONFIG.superAdminEmail);
      if (isApproved || isSuperAdmin) document.getElementById("createBtn").style.display = "inline-block";

      await Promise.all([loadMyMemorials(), loadSharedMemorials(), loadStats()]);
    }

    function memCard(m, isAdmin) {
      var img = m.image_url
        ? '<img src="'+m.image_url+'" alt="'+m.full_name+'" />'
        : '🕌';
      var progress = m.juzDone !== undefined
        ? '<div class="mem-progress"><div class="mem-progress-label"><span>Khatam progress</span><span>'+(m.juzDone||0)+'/30 Juz</span></div><div class="mem-progress-bar"><div class="mem-progress-fill" style="width:'+((m.juzDone||0)/30*100)+'%"></div></div></div>'
        : '';
      var adminBtn = isAdmin ? '<a href="admin.html" class="mem-btn mem-btn-secondary">Manage</a>' : '';
      return '<a href="recite.html?slug='+encodeURIComponent(m.slug)+'" class="mem-card">'+
        '<div class="mem-card-top">'+
        '<div class="mem-avatar">'+img+'</div>'+
        '<div><p class="mem-name">'+escH(m.full_name)+'</p>'+
        '<p class="mem-meta">'+(m.mosque_name?'🕌 '+escH(m.mosque_name)+'<br>':'')+(m.date_of_passing?'📅 '+escH(m.date_of_passing):'')+'</p></div>'+
        '</div>'+progress+
        '<div class="mem-actions">'+
        '<a href="recite.html?slug='+encodeURIComponent(m.slug)+'" class="mem-btn mem-btn-primary" onclick="event.stopPropagation()">Recite</a>'+
        '<a href="totals.html?slug='+encodeURIComponent(m.slug)+'" class="mem-btn mem-btn-secondary" onclick="event.stopPropagation()">Totals</a>'+
        adminBtn+
        '</div></a>';
    }

    async function loadMyMemorials() {
      var grid = document.getElementById("myMemGrid");
      var isApproved = currentProfile && currentProfile.account_type === "mosque_approved";
      var isSuperAdmin = currentUser.email === (window.APP_CONFIG && window.APP_CONFIG.superAdminEmail);
      if (!isApproved && !isSuperAdmin) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🕌</div><h3>No memorials created</h3><p>Mosque accounts can create memorials.<br>Ask your mosque to register.</p></div>';
        return;
      }
      var r = await client.from("memorials").select("*").order("created_at",{ascending:false});
      if (!r.data || !r.data.length) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><h3>No memorials yet</h3><p>Create your first memorial to get started.</p><a href="admin.html" class="btn btn-primary" style="font-size:13px;padding:8px 16px;">Create memorial</a></div>';
        return;
      }
      for (var i=0;i<r.data.length;i++) {
        var cr = await client.from("khatam_campaigns").select("id").eq("memorial_id",r.data[i].id).limit(1);
        if (!cr.error&&cr.data&&cr.data.length) {
          var cl = await client.from("khatam_claims").select("status").eq("campaign_id",cr.data[0].id);
          r.data[i].juzDone = (cl.data||[]).filter(function(c){return c.status==="completed";}).length;
        }
      }
      grid.innerHTML = r.data.map(function(m){return memCard(m,true);}).join("");
    }

    async function loadSharedMemorials() {
      var grid = document.getElementById("sharedMemGrid");
      var saved = null;
      try { var raw = localStorage.getItem("memorial_user_details"); if(raw) saved=JSON.parse(raw); } catch(e){}
      var name = saved ? (saved.relation==="Anonymous"?"Anonymous":saved.name) : (currentProfile?currentProfile.full_name:null);
      if (!name) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔗</div><h3>None yet</h3><p>Open a memorial link shared with you via WhatsApp to join it.</p></div>';
        return;
      }
      var pr = await client.from("participants").select("memorial_id").eq("name",name);
      if (!pr.data||!pr.data.length) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔗</div><h3>None yet</h3><p>Open a memorial link shared with you via WhatsApp to join it.</p></div>';
        return;
      }
      var ids = pr.data.map(function(p){return p.memorial_id;});
      var mr = await client.from("memorials").select("*").in("id",ids);
      if (!mr.data||!mr.data.length) { grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔗</div><h3>None found</h3></div>'; return; }
      grid.innerHTML = mr.data.map(function(m){return memCard(m,false);}).join("");
    }

    async function loadStats() {
      try {
        var saved = null;
        try { var raw=localStorage.getItem("memorial_user_details"); if(raw) saved=JSON.parse(raw); } catch(e){}
        var name = saved?(saved.relation==="Anonymous"?"Anonymous":saved.name):(currentProfile?currentProfile.full_name:null);
        if (!name) return;
        var pr = await client.from("participants").select("id").eq("name",name);
        var ids = (pr.data||[]).map(function(p){return p.id;});
        document.getElementById("myMem").textContent = ids.length;
        var recTotal=0;
        if (ids.length) {
          var rr = await client.from("quick_recitations").select("recitation_count").in("participant_id",ids);
          (rr.data||[]).forEach(function(r){recTotal+=r.recitation_count;});
          var jr = await client.from("khatam_claims").select("id").in("participant_id",ids);
          document.getElementById("myJuz").textContent = (jr.data||[]).length;
        }
        document.getElementById("myRec").textContent = recTotal;
        var nr = await client.from("memory_notes").select("id").eq("author_name",name);
        document.getElementById("myNotes").textContent = (nr.data||[]).length;
      } catch(e){console.error(e);}
    }

    function doSearch(q) {
      var results = document.getElementById("searchResults");
      clearTimeout(searchTimer);
      if (!q||q.trim().length<2) { results.style.display="none"; results.innerHTML=""; return; }
      results.style.display="grid";
      results.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><h3>Searching...</h3></div>';
      searchTimer = setTimeout(async function(){
        var r = await client.from("memorials").select("*")
          .or("full_name.ilike.%"+q.trim()+"%,mosque_name.ilike.%"+q.trim()+"%,uk_city.ilike.%"+q.trim()+"%").limit(9);
        if (!r.data||!r.data.length) { results.innerHTML='<div class="empty-state"><div class="empty-icon">😔</div><h3>No memorials found</h3><p>Try a different name or mosque.</p></div>'; return; }
        results.innerHTML = r.data.map(function(m){return memCard(m,false);}).join("");
      },400);
    }

    function escH(v) { return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    init();
  </script>
  <script src="nav.js"></script>
</body>
</html>
