<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account — Khatam</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background:#03110f; color:#f5f5f0; }
    .shell { width:min(600px,calc(100% - 32px)); margin:0 auto; padding:24px 0 90px; }

    .avatar-section { text-align:center; padding:28px 0 20px; }
    .avatar-circle { width:72px; height:72px; border-radius:50%; background:#caa85c; color:#111; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:bold; margin:0 auto 12px; }
    .avatar-name { font-size:22px; font-weight:bold; margin:0 0 4px; }
    .avatar-email { font-size:14px; color:#c9c7b9; margin:0 0 6px; }
    .account-type-badge { display:inline-block; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:bold; }
    .badge-public { background:rgba(255,255,255,.08); color:#c9c7b9; }
    .badge-mosque { background:rgba(202,168,92,.15); color:#caa85c; border:1px solid rgba(202,168,92,.3); }

    .section-card { background:linear-gradient(135deg,#0d1e18,#10241d); border:1px solid rgba(255,255,255,.06); border-radius:18px; padding:20px; margin-bottom:14px; }
    .section-card h3 { margin:0 0 14px; font-size:15px; color:#caa85c; }

    .field { margin-bottom:12px; }
    .field label { display:block; font-size:12px; color:#c9c7b9; margin-bottom:5px; }
    .field input, .field select { width:100%; border:none; outline:none; border-radius:12px; padding:12px 14px; background:#1a3028; color:#fff; font-size:14px; box-sizing:border-box; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .field-value { padding:12px 14px; background:#1a3028; border-radius:12px; font-size:14px; color:#f5f5f0; }

    .stat-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:0; }
    .stat-box { background:#1a3028; border-radius:12px; padding:12px 8px; text-align:center; }
    .stat-val { display:block; font-size:22px; font-weight:bold; color:#caa85c; }
    .stat-lbl { display:block; font-size:10px; color:#c9c7b9; margin-top:3px; }

    .action-list { display:flex; flex-direction:column; gap:8px; }
    .action-item { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:#1a3028; border-radius:12px; cursor:pointer; border:none; width:100%; font-family:inherit; color:#f5f5f0; font-size:14px; text-decoration:none; }
    .action-item:hover { background:#1f3530; }
    .action-item .action-icon { font-size:18px; margin-right:10px; }
    .action-item .action-arrow { color:#5a7a6a; font-size:16px; }
    .action-item.danger { color:#e87070; }
    .action-item.danger:hover { background:rgba(232,112,112,.1); }

    .edit-mode { display:none; }
    .view-mode { display:block; }

    .notice { padding:12px 14px; border-radius:12px; font-size:13px; margin-top:10px; display:none; }
    .notice.success { background:rgba(61,214,140,.08); border:1px solid rgba(61,214,140,.25); color:#3dd68c; }
    .notice.error { background:rgba(232,112,112,.1); border:1px solid rgba(232,112,112,.3); color:#e87070; }

    @media(max-width:480px) { .stat-row { grid-template-columns:repeat(2,1fr); } .field-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="shell">

    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-circle" id="avatarInitials">?</div>
      <h1 class="avatar-name" id="profileName">Loading...</h1>
      <p class="avatar-email" id="profileEmail"></p>
      <span class="account-type-badge badge-public" id="accountTypeBadge">Public</span>
    </div>

    <!-- My stats -->
    <div class="section-card">
      <h3>My recitation stats</h3>
      <div class="stat-row">
        <div class="stat-box"><span class="stat-val" id="statRec">—</span><span class="stat-lbl">Recitations</span></div>
        <div class="stat-box"><span class="stat-val" id="statMem">—</span><span class="stat-lbl">Memorials</span></div>
        <div class="stat-box"><span class="stat-val" id="statJuz">—</span><span class="stat-lbl">Juz claimed</span></div>
        <div class="stat-box"><span class="stat-val" id="statNotes">—</span><span class="stat-lbl">Memory notes</span></div>
      </div>
    </div>

    <!-- Profile details — view mode -->
    <div class="section-card" id="viewCard">
      <h3>My details</h3>
      <div class="view-mode" id="viewMode">
        <div class="field"><label>Full name</label><div class="field-value" id="viewName">—</div></div>
        <div class="field-row">
          <div class="field"><label>City</label><div class="field-value" id="viewCity">—</div></div>
          <div class="field"><label>Pakistani city</label><div class="field-value" id="viewPakCity">—</div></div>
        </div>
        <div class="field"><label>Mosque attended</label><div class="field-value" id="viewMosque">—</div></div>
        <div class="field"><label>Phone</label><div class="field-value" id="viewPhone">—</div></div>
        <button class="btn btn-secondary" style="width:100%;margin-top:4px;" id="editBtn">Edit profile</button>
      </div>

      <!-- Edit mode -->
      <div class="edit-mode" id="editMode">
        <div class="field"><label>Full name</label><input type="text" id="editName" /></div>
        <div class="field-row">
          <div class="field"><label>UK City</label><input type="text" id="editCity" /></div>
          <div class="field"><label>Pakistani city</label><input type="text" id="editPakCity" /></div>
        </div>
        <div class="field"><label>Mosque attended</label><input type="text" id="editMosque" /></div>
        <div class="field"><label>Phone (optional)</label><input type="tel" id="editPhone" /></div>
        <div style="display:flex;gap:10px;margin-top:4px;">
          <button class="btn btn-primary" style="flex:1;" id="saveProfileBtn">Save changes</button>
          <button class="btn btn-secondary" style="flex:1;" id="cancelEditBtn">Cancel</button>
        </div>
        <div class="notice success" id="saveSuccess">Profile updated successfully.</div>
        <div class="notice error" id="saveError"></div>
      </div>
    </div>

    <!-- Account actions -->
    <div class="section-card">
      <h3>Account</h3>
      <div class="action-list">
        <a href="dashboard.html" class="action-item">
          <span><span class="action-icon">🏠</span>My Dashboard</span>
          <span class="action-arrow">›</span>
        </a>
        <a href="rewards.html" class="action-item">
          <span><span class="action-icon">🌟</span>Barakah Rewards</span>
          <span class="action-arrow">›</span>
        </a>
        <button class="action-item" id="changePasswordBtn">
          <span><span class="action-icon">🔑</span>Change password</span>
          <span class="action-arrow">›</span>
        </button>
        <button class="action-item danger" id="signOutBtn">
          <span><span class="action-icon">🚪</span>Sign out</span>
          <span class="action-arrow">›</span>
        </button>
      </div>
    </div>

    <!-- Password reset notice -->
    <div class="notice success" id="pwResetNotice" style="margin-top:0;">Password reset email sent — check your inbox.</div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    var client = window.supabase.createClient(
      window.APP_CONFIG.supabaseUrl,
      window.APP_CONFIG.supabasePublishableKey
    );

    var currentUser = null;
    var currentProfile = null;

    async function init() {
      var s = await client.auth.getSession();
      if (!s.data || !s.data.session) { window.location.href = "login.html"; return; }
      currentUser = s.data.session.user;

      var p = await client.from("profiles").select("*").eq("id", currentUser.id).maybeSingle();
      currentProfile = p.data;

      renderProfile();
      await loadStats();
    }

    function renderProfile() {
      if (!currentProfile && !currentUser) return;
      var name = currentProfile ? currentProfile.full_name : (currentUser.email || "");
      var email = currentUser.email || "";
      var initials = name.split(" ").map(function(n){return n[0]||"";}).join("").slice(0,2).toUpperCase() || "?";

      document.getElementById("avatarInitials").textContent = initials;
      document.getElementById("profileName").textContent = name;
      document.getElementById("profileEmail").textContent = email;

      var typeBadge = document.getElementById("accountTypeBadge");
      var type = currentProfile ? currentProfile.account_type : "public";
      typeBadge.textContent = type === "mosque_approved" ? "🕌 Mosque" : type === "mosque" ? "🕌 Mosque (pending)" : "🤲 Public";
      typeBadge.className = "account-type-badge " + (type.includes("mosque") ? "badge-mosque" : "badge-public");

      if (currentProfile) {
        document.getElementById("viewName").textContent = currentProfile.full_name || "—";
        document.getElementById("viewCity").textContent = currentProfile.city || "—";
        document.getElementById("viewPakCity").textContent = currentProfile.mosque_attended || "—";
        document.getElementById("viewMosque").textContent = currentProfile.mosque_attended || "—";
        document.getElementById("viewPhone").textContent = currentProfile.phone || "—";

        document.getElementById("editName").value = currentProfile.full_name || "";
        document.getElementById("editCity").value = currentProfile.city || "";
        document.getElementById("editPhone").value = currentProfile.phone || "";
        document.getElementById("editMosque").value = currentProfile.mosque_attended || "";
      }
    }

    async function loadStats() {
      try {
        var saved = null;
        try { var raw = localStorage.getItem("memorial_user_details"); if(raw) saved = JSON.parse(raw); } catch(e){}
        var name = saved ? (saved.relation==="Anonymous"?"Anonymous":saved.name) : (currentProfile?currentProfile.full_name:null);
        if (!name) return;

        var pr = await client.from("participants").select("id").eq("name",name);
        var participantIds = (pr.data||[]).map(function(p){return p.id;});

        var recTotal = 0;
        if (participantIds.length) {
          var rr = await client.from("quick_recitations").select("recitation_count").in("participant_id",participantIds);
          (rr.data||[]).forEach(function(r){recTotal+=r.recitation_count;});
          var jr = await client.from("khatam_claims").select("id").in("participant_id",participantIds);
          document.getElementById("statJuz").textContent = (jr.data||[]).length;
        }

        var nr = await client.from("memory_notes").select("id").eq("author_name",name);

        document.getElementById("statRec").textContent = recTotal;
        document.getElementById("statMem").textContent = (pr.data||[]).length;
        document.getElementById("statNotes").textContent = (nr.data||[]).length;
      } catch(e) { console.error(e); }
    }

    // Edit profile
    document.getElementById("editBtn").addEventListener("click", function() {
      document.getElementById("viewMode").style.display = "none";
      document.getElementById("editMode").style.display = "block";
    });

    document.getElementById("cancelEditBtn").addEventListener("click", function() {
      document.getElementById("viewMode").style.display = "block";
      document.getElementById("editMode").style.display = "none";
    });

    document.getElementById("saveProfileBtn").addEventListener("click", async function() {
      var btn = this;
      btn.disabled = true; btn.textContent = "Saving...";

      var updates = {
        full_name: document.getElementById("editName").value.trim(),
        city: document.getElementById("editCity").value.trim() || null,
        phone: document.getElementById("editPhone").value.trim() || null,
        mosque_attended: document.getElementById("editMosque").value.trim() || null
      };

      var r = await client.from("profiles").update(updates).eq("id", currentUser.id);
      btn.disabled = false; btn.textContent = "Save changes";

      if (r.error) {
        document.getElementById("saveError").textContent = "Could not save. Please try again.";
        document.getElementById("saveError").style.display = "block";
        return;
      }

      currentProfile = Object.assign(currentProfile || {}, updates);
      renderProfile();
      document.getElementById("saveSuccess").style.display = "block";
      setTimeout(function() {
        document.getElementById("saveSuccess").style.display = "none";
        document.getElementById("viewMode").style.display = "block";
        document.getElementById("editMode").style.display = "none";
      }, 1500);
    });

    // Change password
    document.getElementById("changePasswordBtn").addEventListener("click", async function() {
      if (!currentUser) return;
      var r = await client.auth.resetPasswordForEmail(currentUser.email, {
        redirectTo: window.location.origin + "/account.html"
      });
      if (!r.error) {
        document.getElementById("pwResetNotice").style.display = "block";
        setTimeout(function(){ document.getElementById("pwResetNotice").style.display = "none"; }, 4000);
      }
    });

    // Sign out
    document.getElementById("signOutBtn").addEventListener("click", async function() {
      await client.auth.signOut();
      window.location.href = "landing.html";
    });

    init();
  </script>
  <script src="nav.js"></script>
</body>
</html>
